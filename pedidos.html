<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Pedidos | Rik 3D</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .kanban-board { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; min-height: 70vh; margin-top: 15px; align-items: flex-start; }
        .kanban-col { background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid var(--border); min-width: 280px; flex: 1; display: flex; flex-direction: column; max-height: 75vh; }
        .col-header { padding: 12px; font-weight: bold; text-align: center; border-bottom: 2px solid; border-radius: 8px 8px 0 0; background: var(--card); color: white; position: sticky; top: 0; z-index: 10; }
        .col-header.fila { border-color: #e74c3c; }
        .col-header.fatiando { border-color: #f39c12; }
        .col-header.imprimindo { border-color: #3498db; }
        .col-header.pronto { border-color: #2ecc71; }
        
        .col-body { padding: 10px; overflow-y: auto; flex: 1; min-height: 100px; display: flex; flex-direction: column; gap: 10px; }
        
        .pedido-card { background: var(--card); border: 1px solid #444; border-radius: 6px; padding: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.2s; border-left: 4px solid var(--primary); }
        .pedido-card:hover { transform: translateY(-2px); border-color: var(--primary); }
        
        .p-cliente { font-weight: bold; font-size: 14px; color: var(--primary); margin-bottom: 5px; display: flex; justify-content: space-between; }
        .p-item { font-size: 12px; color: #ccc; margin-bottom: 8px; line-height: 1.4; }
        .p-total { font-size: 14px; font-weight: bold; color: #2ecc71; margin-bottom: 10px; }
        
        .p-botoes { display: flex; gap: 5px; }
        .btn-move { flex: 1; padding: 6px; font-size: 11px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; background: #333; transition: background 0.2s; }
        .btn-move:hover { background: #555; }
        .btn-move.fatiar:hover { background: #f39c12; }
        .btn-move.imprimir:hover { background: #3498db; }
        .btn-move.concluir:hover { background: #2ecc71; }
        .btn-move.voltar:hover { background: #e74c3c; }
        
        .btn-del-pedido { background: transparent; border: none; color: #888; cursor: pointer; font-size: 14px; padding: 0; }
        .btn-del-pedido:hover { color: #e74c3c; }

        .btn-sync { background: #2ecc71; color: #000; font-weight: bold; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .btn-sync:hover { background: #27ae60; }
    </style>
</head>
<body>

    <div id="menu-container"></div>

    <div class="aba ativa" style="padding-bottom: 0;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <h2 style="color:var(--primary); margin:0;">🚀 GESTÃO DE PRODUÇÃO</h2>
            <button class="btn-sync" onclick="puxarPedidosNuvem()">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
                Sincronizar Pedidos da Loja
            </button>
        </div>

        <div class="kanban-board">
            <div class="kanban-col">
                <div class="col-header fila">📥 FILA DE ESPERA <span id="qtd-pendente"></span></div>
                <div class="col-body" id="col-pendente"></div>
            </div>

            <div class="kanban-col">
                <div class="col-header fatiando">💻 FATIANDO <span id="qtd-fatiando"></span></div>
                <div class="col-body" id="col-fatiando"></div>
            </div>

            <div class="kanban-col">
                <div class="col-header imprimindo">🖨️ IMPRIMINDO <span id="qtd-imprimindo"></span></div>
                <div class="col-body" id="col-imprimindo"></div>
            </div>

            <div class="kanban-col">
                <div class="col-header pronto">📦 PRONTO / ENVIADO <span id="qtd-pronto"></span></div>
                <div class="col-body" id="col-pronto"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <script src="banco.js"></script>
    
    <script>
        window.onload = function() {
            carregarBanco();
            construirMenu('pedidos');
            
            // Garante que a gaveta de pedidos existe
            if (!db.pedidos) db.pedidos = [];
            
            // Espera o Firebase sincronizar antes de renderizar
            setTimeout(renderKanban, 1000);
        };

        // ==========================================
        // 📥 PUXAR PEDIDOS DA NUVEM (LOJA ONLINE)
        // ==========================================
        function puxarPedidosNuvem() {
            if (typeof firebase === 'undefined' || !navigator.onLine) {
                alert("Sem conexão com a internet ou Firebase não carregado.");
                return;
            }

            mostrarToast("Buscando novos pedidos...");
            
            firebase.database().ref('pedidos_online').once('value').then(function(snapshot) {
                let pedidosNuvem = snapshot.val();
                let novosCount = 0;

                if (pedidosNuvem) {
                    // Transforma o objeto do Firebase em Array e percorre
                    Object.keys(pedidosNuvem).forEach(key => {
                        let p = pedidosNuvem[key];
                        
                        // Verifica se o pedido já não foi lido e puxado antes
                        if (!p.lido) {
                            // Cria o formato interno para o ERP
                            let novoPedido = {
                                id: Date.now() + Math.floor(Math.random() * 1000), // ID único
                                cliente: p.cliente,
                                whatsapp: p.whatsapp || "",
                                produto: p.produto,
                                qtd: p.qtd,
                                valorTotal: parseFloat(p.valorTotal) || 0,
                                endereco: p.endereco || "Não informado",
                                data: p.data,
                                status: 'pendente' // Cai direto na primeira coluna
                            };

                            db.pedidos.push(novoPedido);
                            novosCount++;

                            // Marca na nuvem que este pedido já foi para o ERP (para não puxar em dobro depois)
                            firebase.database().ref('pedidos_online/' + key).update({ lido: true });
                        }
                    });
                }

                if (novosCount > 0) {
                    salvarBanco();
                    renderKanban();
                    alert(`Sucesso! ${novosCount} novo(s) pedido(s) adicionado(s) à Fila de Espera!`);
                } else {
                    mostrarToast("Nenhum pedido novo no momento.");
                }
            }).catch(e => {
                alert("Erro ao buscar pedidos: " + e.message);
            });
        }

        // ==========================================
        // 🎨 RENDERIZAR O QUADRO KANBAN
        // ==========================================
        function renderKanban() {
            if (!db.pedidos) db.pedidos = [];

            // Limpa as colunas
            document.getElementById('col-pendente').innerHTML = "";
            document.getElementById('col-fatiando').innerHTML = "";
            document.getElementById('col-imprimindo').innerHTML = "";
            document.getElementById('col-pronto').innerHTML = "";

            let contadores = { pendente: 0, fatiando: 0, imprimindo: 0, pronto: 0 };

            // Renderiza os cartões de trás pra frente (mais recentes no topo)
            [...db.pedidos].reverse().forEach(p => {
                let status = p.status || 'pendente';
                contadores[status]++;

                let cardHTML = `
                    <div class="pedido-card">
                        <div class="p-cliente">
                            <span>👤 ${p.cliente}</span>
                            <button class="btn-del-pedido" onclick="deletarPedido('${p.id}')" title="Apagar Pedido">✖</button>
                        </div>
                        <div class="p-item">
                            <b>📦 Produto:</b> ${p.produto} (x${p.qtd})<br>
                            <b>📍 Endereço:</b> ${p.endereco}<br>
                            <b>📅 Data:</b> ${p.data.split(' ')[0]}
                        </div>
                        <div class="p-total">💰 R$ ${parseFloat(p.valorTotal).toFixed(2)}</div>
                        
                        <div class="p-botoes">
                            ${gerarBotoesMover(p.id, status)}
                        </div>
                        
                        <div style="margin-top: 10px; border-top: 1px solid #444; padding-top: 8px; text-align: center;">
                            <a href="https://wa.me/55${(p.whatsapp || '').replace(/\D/g, '')}" target="_blank" style="color:#25D366; text-decoration:none; font-size:11px; font-weight:bold;">💬 ABRIR WHATSAPP DO CLIENTE</a>
                        </div>
                    </div>
                `;

                let colElement = document.getElementById(`col-${status}`);
                if (colElement) {
                    colElement.innerHTML += cardHTML;
                }
            });

            // Atualiza os contadores no topo das colunas
            document.getElementById('qtd-pendente').innerText = `(${contadores.pendente})`;
            document.getElementById('qtd-fatiando').innerText = `(${contadores.fatiando})`;
            document.getElementById('qtd-imprimindo').innerText = `(${contadores.imprimindo})`;
            document.getElementById('qtd-pronto').innerText = `(${contadores.pronto})`;
        }

        // ==========================================
        // 🔄 LÓGICA DE MOVER OS CARTÕES
        // ==========================================
        function gerarBotoesMover(id, status) {
            if (status === 'pendente') {
                return `<button class="btn-move fatiar" onclick="mudarStatus('${id}', 'fatiando')">Mandar p/ Fatiador ➔</button>`;
            } 
            else if (status === 'fatiando') {
                return `
                    <button class="btn-move voltar" onclick="mudarStatus('${id}', 'pendente')">⬅ Voltar</button>
                    <button class="btn-move imprimir" onclick="mudarStatus('${id}', 'imprimindo')">Mandar Imprimir ➔</button>
                `;
            } 
            else if (status === 'imprimindo') {
                return `
                    <button class="btn-move voltar" onclick="mudarStatus('${id}', 'fatiando')">⬅ Voltar</button>
                    <button class="btn-move concluir" onclick="mudarStatus('${id}', 'pronto')">Finalizar Pedido ✔️</button>
                `;
            } 
            else if (status === 'pronto') {
                return `<button class="btn-move voltar" onclick="mudarStatus('${id}', 'imprimindo')">⬅ Desfazer</button>`;
            }
        }

        function mudarStatus(id, novoStatus) {
            let index = db.pedidos.findIndex(p => String(p.id) === String(id));
            if (index !== -1) {
                db.pedidos[index].status = novoStatus;
                
                // Se foi marcado como PRONTO, registra a venda automaticamente no CAIXA!
                if(novoStatus === 'pronto') {
                    registrarVendaNoCaixa(db.pedidos[index]);
                }

                salvarBanco();
                renderKanban();
            }
        }

        function deletarPedido(id) {
            if (confirm("Tem certeza que deseja apagar este pedido do sistema?")) {
                db.pedidos = db.pedidos.filter(p => String(p.id) !== String(id));
                salvarBanco();
                renderKanban();
            }
        }

        // ==========================================
        // 💰 INTEGRAÇÃO COM O CAIXA (FINANÇAS)
        // ==========================================
        function registrarVendaNoCaixa(pedido) {
            // Verifica se a venda já foi registrada para não duplicar se o usuário voltar o status
            let jaRegistrado = db.financas.some(f => f.pedidoId === pedido.id);
            
            if (!jaRegistrado) {
                if(!db.financas) db.financas = [];
                
                db.financas.push({
                    id: Date.now(),
                    pedidoId: pedido.id,
                    desc: `Venda Loja Online: ${pedido.produto}`,
                    valor: Math.abs(parseFloat(pedido.valorTotal)), // Valor positivo (Lucro)
                    data: new Date().toLocaleDateString(),
                    corHex: "#2ecc71" // Verde para dinheiro entrando
                });
                mostrarToast("Venda contabilizada no Caixa!");
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Caixa e Finanças | Rik 3D</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .dash-card { background: var(--card); padding: 20px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .dash-card h3 { margin: 0; font-size: 14px; color: #858585; text-transform: uppercase; letter-spacing: 1px; }
        .dash-card .valor { font-size: 24px; font-weight: bold; margin-top: 10px; }
        
        .valor-positivo { color: #2ecc71; }
        .valor-negativo { color: #e74c3c; }
        .valor-neutro { color: var(--primary); }

        .form-transacao { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px dashed var(--primary); margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
        .form-group { flex: 1; min-width: 150px; }
        .form-group label { display: block; font-size: 12px; color: #ccc; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        
        .lista-transacoes { display: flex; flex-direction: column; gap: 10px; }
        .transacao-item { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px; border-radius: 8px; border-left: 4px solid transparent; }
        .transacao-item.entrada { border-color: #2ecc71; }
        .transacao-item.saida { border-color: #e74c3c; }
        
        .t-info { display: flex; flex-direction: column; gap: 4px; }
        .t-desc { font-weight: bold; font-size: 14px; }
        .t-data { font-size: 11px; color: #858585; }
        
        .t-valor-box { text-align: right; }
        .t-valor { font-size: 16px; font-weight: bold; }
        .btn-del-t { background: transparent; border: none; color: #666; font-size: 11px; cursor: pointer; margin-top: 5px; text-decoration: underline; }
        .btn-del-t:hover { color: #e74c3c; }

        @media (max-width: 600px) {
            .dashboard-cards { grid-template-columns: 1fr; }
            .form-transacao { flex-direction: column; }
            .form-group { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="menu-container"></div>

    <div class="aba ativa">
        <h2 style="color:var(--primary); margin-top:0;">💰 FLUXO DE CAIXA</h2>

        <div class="dashboard-cards">
            <div class="dash-card">
                <h3>Entradas (Receitas)</h3>
                <div class="valor valor-positivo" id="cx-entradas">R$ 0,00</div>
            </div>
            <div class="dash-card">
                <h3>Saídas (Despesas)</h3>
                <div class="valor valor-negativo" id="cx-saidas">R$ 0,00</div>
            </div>
            <div class="dash-card" style="border-color: var(--primary);">
                <h3 style="color: var(--primary);">Saldo em Caixa</h3>
                <div class="valor" id="cx-saldo">R$ 0,00</div>
            </div>
        </div>

        <div class="form-transacao">
            <div class="form-group" style="flex: 2;">
                <label>Descrição da Movimentação</label>
                <input type="text" id="t-desc" placeholder="Ex: Venda Balcão, Conta de Luz, Manutenção...">
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <select id="t-tipo">
                    <option value="entrada">➕ Entrada (Lucro)</option>
                    <option value="saida">➖ Saída (Gasto)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Valor (R$)</label>
                <input type="number" id="t-valor" placeholder="0.00" step="0.01">
            </div>
            <div class="form-group" style="flex: 0.5;">
                <button class="btn-salvar" style="margin:0; width: 100%; height: 38px;" onclick="adicionarTransacao()">LANÇAR</button>
            </div>
        </div>

        <h3 style="margin-top: 30px; color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 10px;">Histórico de Movimentações</h3>
        <div class="lista-transacoes" id="lista-transacoes">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <script src="banco.js"></script>
    
    <script>
        window.onload = function() {
            carregarBanco();
            construirMenu('caixa');
            
            // Garante que a gaveta do caixa existe
            if (!db.financas) db.financas = [];
            
            // Renderiza após um pequeno delay para o Firebase sincronizar
            setTimeout(renderCaixa, 800);
        };

        function renderCaixa() {
            if (!db.financas) db.financas = [];

            let totalEntradas = 0;
            let totalSaidas = 0;
            let htmlLista = "";

            // Organiza da transação mais nova para a mais velha
            let financasOrdenadas = [...db.financas].sort((a, b) => b.id - a.id);

            financasOrdenadas.forEach(f => {
                let valorNum = parseFloat(f.valor) || 0;
                let isEntrada = valorNum >= 0;

                if (isEntrada) {
                    totalEntradas += valorNum;
                } else {
                    totalSaidas += Math.abs(valorNum);
                }

                let classeCard = isEntrada ? 'entrada' : 'saida';
                let corTexto = isEntrada ? '#2ecc71' : '#e74c3c';
                let icone = isEntrada ? '⬆️' : '⬇️';

                htmlLista += `
                    <div class="transacao-item ${classeCard}">
                        <div class="t-info">
                            <span class="t-desc">${f.desc}</span>
                            <span class="t-data">📅 ${f.data || 'Data desconhecida'}</span>
                        </div>
                        <div class="t-valor-box">
                            <span class="t-valor" style="color: ${corTexto};">${icone} R$ ${Math.abs(valorNum).toFixed(2)}</span><br>
                            <button class="btn-del-t" onclick="apagarTransacao(${f.id})">Excluir Lançamento</button>
                        </div>
                    </div>
                `;
            });

            // Atualiza os painéis lá em cima
            let saldoFinal = totalEntradas - totalSaidas;

            document.getElementById('cx-entradas').innerText = `R$ ${totalEntradas.toFixed(2)}`;
            document.getElementById('cx-saidas').innerText = `R$ ${totalSaidas.toFixed(2)}`;
            
            let elSaldo = document.getElementById('cx-saldo');
            elSaldo.innerText = `R$ ${saldoFinal.toFixed(2)}`;
            
            if (saldoFinal > 0) elSaldo.className = "valor valor-positivo";
            else if (saldoFinal < 0) elSaldo.className = "valor valor-negativo";
            else elSaldo.className = "valor valor-neutro";

            document.getElementById('lista-transacoes').innerHTML = htmlLista || "<p style='text-align:center; color:#888; padding: 20px;'>Nenhuma movimentação registrada no caixa ainda.</p>";
        }

        function adicionarTransacao() {
            let desc = document.getElementById('t-desc').value.trim();
            let tipo = document.getElementById('t-tipo').value;
            let valorInput = parseFloat(document.getElementById('t-valor').value);

            if (!desc || isNaN(valorInput) || valorInput <= 0) {
                alert("Preencha uma descrição válida e um valor maior que zero!");
                return;
            }

            // Se for saída, transforma o número em negativo
            let valorFinal = tipo === 'entrada' ? valorInput : -Math.abs(valorInput);

            db.financas.push({
                id: Date.now(),
                desc: desc,
                valor: valorFinal,
                data: new Date().toLocaleDateString()
            });

            // Limpa os campos
            document.getElementById('t-desc').value = "";
            document.getElementById('t-valor').value = "";

            salvarBanco();
            renderCaixa();
            mostrarToast("Lançamento salvo com sucesso!");
        }

        function apagarTransacao(id) {
            if (confirm("Tem certeza que deseja apagar este lançamento do seu caixa?")) {
                db.financas = db.financas.filter(f => String(f.id) !== String(id));
                salvarBanco();
                renderCaixa();
                mostrarToast("Lançamento apagado.");
            }
        }
    </script>
</body>
</html>

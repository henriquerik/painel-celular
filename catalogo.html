<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Rik 3D</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .filtros-container { display:flex; gap:10px; margin-bottom:15px; flex-wrap: wrap; }
        .busca-input { flex: 2; min-width: 200px; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--input); color: white; font-size: 14px; font-family: inherit; }
        .busca-input:focus { border-color: var(--primary); outline: none; }
        .categoria-select { flex: 1; min-width: 150px; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--input); color: white; font-size: 14px; font-family: inherit; cursor: pointer; }

        .color-indicator { width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin-left: 5px; border: 1px solid #555; vertical-align: middle; }
        .vitrine-img-mini { width: 70px; height: 70px; object-fit: cover; border-radius: 4px; background: var(--input); border: 1px solid var(--border); }
        
        /* Ajustes para o Sistema de Grid Dinâmico */
        #listaProdutos { display: grid; grid-template-columns: 1fr; gap: 15px; align-items: stretch; }
        .card-item { margin-top: 0 !important; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
        .card-flex { display: flex; gap: 15px; align-items: flex-start; flex-wrap: wrap; }
        
        .p-categoria { font-size: 10px; color: var(--primary); text-transform: uppercase; font-weight: bold; margin-bottom: 3px; }
    </style>
</head>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
<script src="banco.js"></script>
<body>

    <div id="menu-container"></div>

    <div class="aba ativa">
        <h3 style="margin-top: 0; color: var(--primary);">📦 O Seu Catálogo e Box Físico</h3>
        
        <div class="filtros-container">
            <input type="text" id="filtro-nome" class="busca-input" placeholder="🔍 Procurar produto pelo nome..." oninput="renderCatalogo()">
            <select id="filtro-categoria" class="categoria-select" onchange="renderCatalogo()">
                <option value="">Todas as Categorias</option>
            </select>
            <select id="filtro-colunas" class="categoria-select" style="flex: 0.5; min-width: 120px;" onchange="mudarGrid()">
                <option value="1">1 por linha</option>
                <option value="2">2 por linha</option>
                <option value="3">3 por linha</option>
                <option value="4">4 por linha</option>
            </select>
        </div>
        
        <div id="listaProdutos"></div>
    </div>

    <script>
        // Quando a página abre
        window.onload = function() {
            carregarBanco();
            construirMenu('catalogo');
            
            // Carrega a preferência de colunas do usuário salva na memória
            var colunasSalvas = localStorage.getItem('rik3d_grid_catalogo') || "1";
            document.getElementById('filtro-colunas').value = colunasSalvas;
            mudarGrid();
            
            // Renderiza após um pequeno delay para garantir que o banco carregou da nuvem
            setTimeout(renderCatalogo, 500);
        };

        // Função para mudar a quantidade de colunas na tela
        function mudarGrid() {
            var colunas = document.getElementById('filtro-colunas').value;
            document.getElementById('listaProdutos').style.gridTemplateColumns = `repeat(${colunas}, 1fr)`;
            localStorage.setItem('rik3d_grid_catalogo', colunas); // Salva para não esquecer ao atualizar a página
        }

        // ==========================================
        // RENDERIZAR A LISTA DE PRODUTOS E FILTROS
        // ==========================================
        function renderCatalogo() {
            try {
                if(!db.produtos) db.produtos = [];

                // 1. ATUALIZA O MENU DE CATEGORIAS
                let categorias = new Set();
                db.produtos.forEach(p => {
                    // Separa as múltiplas categorias para o filtro funcionar certinho
                    if(p && p.categoria) {
                        p.categoria.split(',').forEach(c => {
                            let limpa = c.trim();
                            if(limpa) categorias.add(limpa);
                        });
                    }
                });
                
                let selectHtml = '<option value="">Todas as Categorias</option>';
                let catAtual = document.getElementById('filtro-categoria').value; // Guarda o que estava selecionado
                
                Array.from(categorias).sort().forEach(c => {
                    selectHtml += `<option value="${c}" ${catAtual === c ? 'selected' : ''}>${c}</option>`;
                });
                document.getElementById('filtro-categoria').innerHTML = selectHtml;

                // 2. APLICA OS FILTROS DE BUSCA E CATEGORIA
                var busca = document.getElementById('filtro-nome').value.toLowerCase(); 
                var catSelecionada = document.getElementById('filtro-categoria').value;
                
                var htmlProd = "";
                var produtosInvertidos = db.produtos.slice().reverse();

                for (var j = 0; j < produtosInvertidos.length; j++) {
                    var p = produtosInvertidos[j]; 
                    if (!p) continue;
                    
                    // Lógica do filtro
                    var matchNome = String(p.nome || "").toLowerCase().includes(busca);
                    
                    // Verifica se a categoria escolhida está na lista do produto
                    let catsDoProduto = p.categoria ? p.categoria.split(',').map(c => c.trim()) : [];
                    let matchCategoria = catSelecionada === "" || catsDoProduto.includes(catSelecionada);
                    
                    if (matchNome && matchCategoria) {
                        var pVenda = parseFloat(p.precoVenda) || 0; 
                        var pAtacado = p.precoAtacado !== undefined ? parseFloat(p.precoAtacado) : pVenda; 
                        var qAtacado = parseInt(p.qtdAtacado) || 10;
                        var pCusto = parseFloat(p.custoUnidade) || 0; 
                        var pFeito = parseInt(p.feito) || 0; 
                        var pVendido = parseInt(p.vendido) || 0;

                        // Lógica avançada do Box Físico (Consignação)
                        var consignadoGlobal = 0; 
                        if (db.clientes) {
                            db.clientes.forEach(function(cli) {
                                if (cli.consignados) {
                                    cli.consignados.forEach(function(con) {
                                        if (String(con.prodId) === String(p.id)) { consignadoGlobal += con.qtd; }
                                    });
                                }
                            });
                        }
                        
                        // Adaptação para o novo formato de consignados que migramos na outra tela
                        var pecasConsigNovas = db.consignados ? db.consignados.filter(function(con) { return String(con.produtoId) === String(p.id) && con.qtdAtiva > 0; }) : [];
                        for (var x = 0; x < pecasConsigNovas.length; x++) { consignadoGlobal += pecasConsigNovas[x].qtdAtiva; }

                        var emBox = pFeito - pVendido - consignadoGlobal;

                        var coresHTML = "";
                        if (p.materiais && Array.isArray(p.materiais)) {
                            for (var m = 0; m < p.materiais.length; m++) {
                                var mat = p.materiais[m]; 
                                var fEst = db.estoque.find(function(e) { return String(e.id) === String(mat.filId); });
                                if (fEst) {
                                    var corHexM = fEst.cor && fEst.cor.includes('|') ? fEst.cor.split('|')[0].trim() : "transparent";
                                    coresHTML += `<span class="color-indicator" style="background:${corHexM}; margin-right:2px;" title="${fEst.marca}"></span>`;
                                }
                            }
                        }
                        if (coresHTML !== "") { coresHTML = `<div style="margin:5px 0;">${coresHTML}</div>`; }

                        var imgHTML = p.imagem ? `<img src="${p.imagem}" class="vitrine-img-mini">` : `<div class="vitrine-img-mini" style="display:flex; align-items:center; justify-content:center; font-size:10px; color:#555; text-align:center;">Sem Foto</div>`;
                        
                        // Transforma as categorias em etiquetas visuais
                        let txtCategoria = '<div style="display:flex; gap:4px; flex-wrap:wrap; margin-bottom:5px;">';
                        catsDoProduto.forEach(cat => { if(cat) txtCategoria += `<span class="p-categoria">${cat}</span>`; });
                        txtCategoria += '</div>';

                        htmlProd += `
                        <div class="card-item">
                            <div class="card-flex">
                                ${imgHTML}
                                <div style="flex: 1; min-width: 150px;">
                                    <div style="display:flex; justify-content:space-between; align-items: flex-start; gap: 5px;">
                                        <div>
                                            ${txtCategoria}
                                            <b style="font-size:1.2em; display:block; line-height:1.2;">${p.nome || "Sem Nome"}</b>
                                        </div>
                                        <div style="display:flex; gap:5px;">
                                            <button class="btn-edit" style="padding:5px;" onclick="editarProduto(${p.id})">✏️</button>
                                            <button class="btn-del" style="padding:5px;" onclick="apagarProduto(${p.id})">X</button>
                                        </div>
                                    </div>
                                    ${coresHTML}
                                    <div style="color:var(--primary); font-weight:bold; margin-top:5px;">
                                        Varejo: R$ ${pVenda.toFixed(2)} | Atacado: R$ ${pAtacado.toFixed(2)} <small>(+${qAtacado} un)</small>
                                    </div>
                                    <div style="color:#858585; font-size:0.9em;">Custo Fabricação: R$ ${pCusto.toFixed(2)}</div>
                                </div>
                            </div>
                            
                            <div style="margin:12px 0; background:var(--bg); padding:10px; border-radius:4px; font-weight:bold; border: 1px solid var(--border);">
                                Estoque no Box: <span style="color: ${emBox > 0 ? 'var(--primary)' : 'var(--danger)'}; font-size:1.2em;">${emBox} un.</span><br>
                                Em Consignação: <span style="color:var(--warn);">${consignadoGlobal} un.</span><br>
                                <span style="color:#858585; font-size:0.9em; font-weight:normal;">Total Fabricado na Vida: ${pFeito}</span>
                            </div>
                            
                            <div style="display:flex; gap:5px; align-items:center; flex-wrap: wrap; margin-top: auto;">
                                <input type="number" id="qtd-acao-${p.id}" value="1" style="width:60px; margin-bottom:0; flex: 0.3;">
                                <button class="btn-salvar" style="padding:10px; margin:0; flex:1; font-size:11px;" onclick="gerenciarVendaCatalogo(${p.id},'prod')">🖨️ IMPRIMIR</button>
                                <button class="btn-salvar" style="padding:10px; background:var(--warn); color:#000; margin:0; flex:1; font-size:11px;" onclick="gerenciarVendaCatalogo(${p.id},'vend')">💰 VENDER</button>
                            </div>
                        </div>`;
                    }
                }
                
                if (htmlProd === "") htmlProd = "<p style='text-align:center; color:#858585; padding:40px; grid-column: 1/-1;'>Nenhum produto encontrado com estes filtros.</p>";
                document.getElementById('listaProdutos').innerHTML = htmlProd;

            } catch(e) { console.error("Erro renderCatalogo:", e); }
        }

        // ==========================================
        // LÓGICA DE PRODUÇÃO E VENDA RÁPIDA
        // ==========================================
        function gerenciarVendaCatalogo(id, acao) {
            try {
                var p = db.produtos.find(function(i) { return String(i.id) === String(id); }); 
                if (!p) return;
                
                var qtdEl = document.getElementById('qtd-acao-' + id); 
                var qtd = qtdEl ? (parseInt(qtdEl.value) || 1) : 1;
                
                if (acao === 'prod') {
                    if (p.materiais && Array.isArray(p.materiais)) {
                        for(var i = 0; i < p.materiais.length; i++) {
                            var m = p.materiais[i];
                            var idxEstoque = db.estoque.findIndex(function(est) { return String(est.id) === String(m.filId); });
                            if (idxEstoque > -1) {
                                var pAtual = db.estoque[idxEstoque].pesoAtual !== undefined ? parseFloat(db.estoque[idxEstoque].pesoAtual) : parseFloat(db.estoque[idxEstoque].pesoOriginal);
                                var matPeso = parseFloat(m.peso) || 0; 
                                db.estoque[idxEstoque].pesoAtual = pAtual - (matPeso * qtd);
                            }
                        }
                    }
                    p.feito = (parseInt(p.feito) || 0) + qtd;
                    mostrarToast(qtd + " peça(s) fabricada(s)! Estoque descontado.");
                } else {
                    var pFeito = parseInt(p.feito) || 0; 
                    var pVend = parseInt(p.vendido) || 0;
                    
                    var consignadoGlobal = 0;
                    var pecasConsigNovas = db.consignados ? db.consignados.filter(function(con) { return String(con.produtoId) === String(p.id) && con.qtdAtiva > 0; }) : [];
                    for (var x = 0; x < pecasConsigNovas.length; x++) { consignadoGlobal += pecasConsigNovas[x].qtdAtiva; }

                    var emBox = pFeito - pVend - consignadoGlobal;

                    if (emBox < qtd) { 
                        alert(`Aviso: Sem estoque físico no seu Box! Você só tem ${emBox} unidades prontas aqui.\n\nImprima mais peças primeiro.`); 
                        return; 
                    }
                    
                    p.vendido = pVend + qtd;
                    var precoCobrado = parseFloat(p.precoVenda) || 0;
                    var tagVenda = "Varejo";
                    
                    // Se a quantidade vendida for maior ou igual ao mínimo de atacado, aplica o preço de atacado
                    if (p.precoAtacado !== undefined && p.qtdAtacado && qtd >= parseInt(p.qtdAtacado)) { 
                        precoCobrado = parseFloat(p.precoAtacado); 
                        tagVenda = "Atacado";
                    }
                    
                    var valorTotal = precoCobrado * qtd;
                    if(!db.financas) db.financas = [];
                    db.financas.push({ 
                        id: Date.now(), 
                        desc: "Venda Balcão: " + p.nome + " (" + tagVenda + ")", 
                        valor: valorTotal, 
                        data: new Date().toLocaleDateString() 
                    });
                    mostrarToast(`Venda de R$ ${valorTotal.toFixed(2)} lançada no Caixa!`);
                }
                
                salvarBanco(); 
                renderCatalogo();
            } catch(e) { console.error(e); }
        }

        function editarProduto(id) {
            localStorage.setItem('rik3d_edit_prod_id', id);
            window.location.href = 'calc.html';
        }

        function apagarProduto(id) {
            if(!confirm("Tem a certeza absoluta que deseja apagar este produto do seu catálogo?")) return;
            db.produtos = db.produtos.filter(function(i){ return String(i.id) !== String(id); });
            salvarBanco(); 
            renderCatalogo();
        }
    </script>
</body>
</html>
